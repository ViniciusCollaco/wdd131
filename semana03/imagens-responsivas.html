<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 – Fundamentos da Web Dinâmica - Semana 3 uso de imagens</title>
    <meta name="description" content="WDD 131 – Fundamentos da Web Dinâmica, Vinicius de Oliveira Collaço atividade sobre imagens."/>
    <meta name="author" content="Vinicius de Oliveira Collaço"/>
</head>
<body>
    <main>
        <div class="principal">
            <picture>
                <source media="(min-width: 1000px)" srcset="imagens/principal-grande.webp">
                <source media="(min-width: 500px)" srcset="imagens/principal-media.webp">
                <img src="imagens/principal-pequena.webp" alt="templo da Nova Zelandia" width="500" height="250">
            </picture>
        </div>
    </main>
</body>
</html>
